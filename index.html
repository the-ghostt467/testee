<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Restrito</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* --- TELA DE SENHA --- */
    #lock-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      z-index: 100;
      transition: opacity 0.8s ease;
    }

    #lock-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .lock-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 4rem);
      letter-spacing: 0.3em;
      color: #f5a623;
      text-shadow: 0 0 30px #f5a62388;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 20px #f5a62366; }
      50% { text-shadow: 0 0 50px #f5a623cc, 0 0 80px #f5a62344; }
    }

    .lock-subtitle {
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: #aaa;
      text-transform: uppercase;
    }

    .input-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    #pwd-input {
      background: transparent;
      border: none;
      border-bottom: 2px solid #f5a623;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.3em;
      text-align: center;
      width: 220px;
      padding: 0.5rem 0;
      outline: none;
      transition: border-color 0.3s;
    }

    #pwd-input.error {
      border-color: #ff3b3b;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    #error-msg {
      font-size: 0.85rem;
      color: #ff3b3b;
      letter-spacing: 0.1em;
      height: 1.2em;
      transition: opacity 0.3s;
    }

    #unlock-btn {
      margin-top: 0.5rem;
      background: transparent;
      border: 2px solid #f5a623;
      color: #f5a623;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.3em;
      padding: 0.6rem 2.5rem;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, box-shadow 0.3s;
    }

    #unlock-btn:hover {
      background: #f5a623;
      color: #000;
      box-shadow: 0 0 30px #f5a62377;
    }

    /* --- TELA DE CONTEÚDO --- */
    #content-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      padding: 2rem;
      animation: appear 1s ease forwards;
    }

    #content-screen.visible {
      display: flex;
    }

    @keyframes appear {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .energy-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .energy-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid #f5a62344;
      animation: expand 2.5s ease-out infinite;
    }
    .energy-ring:nth-child(1) { width: 280px; height: 280px; animation-delay: 0s; }
    .energy-ring:nth-child(2) { width: 380px; height: 380px; animation-delay: 0.6s; }
    .energy-ring:nth-child(3) { width: 480px; height: 480px; animation-delay: 1.2s; }

    @keyframes expand {
      0%   { opacity: 0.8; transform: scale(0.85); }
      100% { opacity: 0;   transform: scale(1.15); }
    }

    .goku-img {
      position: relative;
      z-index: 2;
      width: min(85vw, 380px);
      border-radius: 4px;
      filter: drop-shadow(0 0 40px #f5a62366);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    .success-text {
      margin-top: 2.5rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 6vw, 3rem);
      letter-spacing: 0.4em;
      color: #f5a623;
      text-shadow: 0 0 40px #f5a623aa;
      text-align: center;
    }

    .success-sub {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      letter-spacing: 0.2em;
      color: #888;
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- TELA DE SENHA -->
  <div id="lock-screen">
    <div class="lock-title">ACESSO RESTRITO</div>
    <div class="lock-subtitle">Digite a senha para continuar</div>
    <div class="input-wrap">
      <input id="pwd-input" type="password" placeholder="••••••" autocomplete="off" />
      <div id="error-msg"></div>
      <button id="unlock-btn">ENTRAR</button>
    </div>
  </div>

  <!-- TELA DE CONTEÚDO -->

  <script>
    const SENHA = "teste123";

    const input = document.getElementById('pwd-input');
    const btn   = document.getElementById('unlock-btn');
    const err   = document.getElementById('error-msg');
    const lock  = document.getElementById('lock-screen');
    const content = document.getElementById('content-screen');

    function tryUnlock() {
      if (input.value === SENHA) {
        lock.classList.add('fade-out');
        setTimeout(() => {
          lock.style.display = 'none';
          content.classList.add('visible');
        }, 800);
      } else {
        err.textContent = 'Senha incorreta. Tente novamente.';
        input.classList.add('error');
        input.value = '';
        setTimeout(() => { input.classList.remove('error'); err.textContent = ''; }, 1500);
      }
    }

    btn.addEventListener('click', tryUnlock);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
  </script>
