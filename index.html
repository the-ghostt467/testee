<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌻</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Quicksand:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fffbf0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Quicksand', sans-serif;
    overflow: hidden;
  }

  /* pontinhos de fundo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #f5d76e44 1px, transparent 1px);
    background-size: 28px 28px;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: white;
    border-radius: 24px;
    padding: 48px 40px 40px;
    box-shadow: 0 8px 40px #f5a62322;
    text-align: center;
    max-width: 340px;
    width: 90%;
    animation: fadeUp .6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* girassol SVG simples */
  .sunflower {
    width: 80px;
    height: 80px;
    margin: 0 auto 16px;
    animation: spin-slow 12s linear infinite;
  }

  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .hint {
    font-family: 'Caveat', cursive;
    font-size: 1.05rem;
    color: #b08020;
    margin-bottom: 24px;
    line-height: 1.4;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  input[type="password"] {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid #f5d76e;
    border-radius: 50px;
    font-family: 'Quicksand', sans-serif;
    font-size: 1rem;
    color: #333;
    background: #fffef5;
    outline: none;
    text-align: center;
    letter-spacing: 3px;
    transition: border .2s;
  }

  input[type="password"]:focus {
    border-color: #f5a623;
  }

  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #f5d76e, #f5a623);
    color: white;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 16px #f5a62340;
  }

  button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px #f5a62355; }
  button:active { transform: translateY(0); }

  .error {
    font-size: .85rem;
    color: #e05555;
    margin-top: 10px;
    min-height: 20px;
    font-family: 'Caveat', cursive;
    font-size: 1rem;
  }

  .shake { animation: shake .35s ease; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-8px); }
    75%      { transform: translateX(8px); }
  }
</style>
</head>
<body>

<div class="card" id="card">

  <!-- Girassol SVG -->
  <svg class="sunflower" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- pétalas -->
    <g>
      <ellipse cx="50" cy="18" rx="6" ry="13" fill="#f5d76e" transform="rotate(0 50 50)"/>
      <ellipse cx="50" cy="18" rx="6" ry="13" fill="#f5d76e" transform="rotate(45 50 50)"/>
      <ellipse cx="50" cy="18" rx="6" ry="13" fill="#f5d76e" transform="rotate(90 50 50)"/>
      <ellipse cx="50" cy="18" rx="6" ry="13" fill="#f5d76e" transform="rotate(135 50 50)"/>
      <ellipse cx="50" cy="18" rx="6" ry="13" fill="#f5c820" transform="rotate(22.5 50 50)"/>
      <ellipse cx="50" cy="18" rx="6" ry="13" fill="#f5c820" transform="rotate(67.5 50 50)"/>
      <ellipse cx="50" cy="18" rx="6" ry="13" fill="#f5c820" transform="rotate(112.5 50 50)"/>
      <ellipse cx="50" cy="18" rx="6" ry="13" fill="#f5c820" transform="rotate(157.5 50 50)"/>
    </g>
    <!-- miolo -->
    <circle cx="50" cy="50" r="17" fill="#6b3a10"/>
    <circle cx="50" cy="50" r="13" fill="#7d4412"/>
    <!-- pontinhos do miolo -->
    <circle cx="46" cy="46" r="1.5" fill="#5a2e08" opacity=".7"/>
    <circle cx="50" cy="44" r="1.5" fill="#5a2e08" opacity=".7"/>
    <circle cx="54" cy="46" r="1.5" fill="#5a2e08" opacity=".7"/>
    <circle cx="44" cy="50" r="1.5" fill="#5a2e08" opacity=".7"/>
    <circle cx="48" cy="50" r="1.5" fill="#5a2e08" opacity=".7"/>
    <circle cx="52" cy="50" r="1.5" fill="#5a2e08" opacity=".7"/>
    <circle cx="56" cy="50" r="1.5" fill="#5a2e08" opacity=".7"/>
    <circle cx="46" cy="54" r="1.5" fill="#5a2e08" opacity=".7"/>
    <circle cx="50" cy="56" r="1.5" fill="#5a2e08" opacity=".7"/>
    <circle cx="54" cy="54" r="1.5" fill="#5a2e08" opacity=".7"/>
  </svg>

  <p class="hint">é pra você 🌻<br>digita a senha pra abrir</p>

  <div class="input-wrap">
    <input type="password" id="pwd" placeholder="••••••" autocomplete="off" />
  </div>
  <button onclick="check()">entrar ✨</button>
  <p class="error" id="err"></p>
</div>

<script>
  // ⬇️ troca pela senha que só ela vai saber
  const SENHA = "milk";

  function check() {
    const val = document.getElementById('pwd').value.trim().toLowerCase();
    const card = document.getElementById('card');
    const err  = document.getElementById('err');

    if (val === SENHA.toLowerCase()) {
      window.location.href = 'carta.html';
    } else {
      err.textContent = 'não foi não 🥺 tenta de novo';
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
    }
  }

  document.getElementById('pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') check();
  });
</script>
</body>
</html>
