<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Você é a estrel mais linda do meu universo!</title>
    
    <style>
        /* O seu CSS (estilo visual) vai aqui dentro */
        body {
            background-color: #0a0e1a; /* Cor de fundo  */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .heart { 
            width: 80px;
            height:80px;
            background: #ff2d55;
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 30px #ff2d55, 0 0 80px #ff2d55;
            animation: pulse 1s ease-in-out infinite;
        }
            .heart::before,
            .heart::after {
                content: '';
                width: 80px;
                height: 80px;
                background: #ff2d55;
                border-radius: 50%;
                position: absolute;
            }

            .heart::before { top: -40px; left: 0; }
            .heart::after  { left: 40px; top: 0; }

            @keyframes pulse {
                0%, 100% {transform: rotate(-45deg) scale(1); }
                50%       {transform: rotate(-45deg) scale(1.15); }
            }
         h2 {color: #bf80ff;
            margin-top: 40px; }
        p {color: #ffffff;}
        .radio {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #111;
            border: 2px solid #bf80ff;
            border-radius: 12px;
            padding: 10px 16px;
            box-shadow: 0 0 15px #bf80ff;
        }

        .radio-display { 
            background: #000;
            color: #bf80ff;
            font-family: monospace;
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .radio-controls button {
            background: transparent;
            border: 1px solid #bf80ff;
            color: #bf80ff;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            margin: 0 2px;
            font-size: 1rem;
        }
        
    </style>
</head>
<body>
<div class="heart"></div>
    <h2>-Bem-vinda. Você é a estrela mais linda do meu universo!</h2>
    <p>Your voice
        is my
        favorite soud.</p>
    <div class="radio">
        <div class="radio-display">
            <span id="song-name">I LOVE YOU</span>
        </div>
        <div class="radio-controls">
            <button onclick="prevSong()">⏮</button>
            <button onclick="togglePlay()">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>
        <audio id="player"></audio>
    </div>
  <script>
  const songs = [
    { name: "CREEPIN", file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { name: "ONE OF THE GIRLS", file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
    { name: "CALL OUT MY NAME", file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
  ];

  let current = 0;
  let playing = false;
  const player = document.getElementById('player');
  const songName = document.getElementById('song-name');

  function loadSong(i) {
    player.src = songs[i].file;
    songName.textContent = songs[i].name;
  }

  function togglePlay() {
    if (playing) {
      player.pause();
      playing = false;
    } else {
      if (!player.src || player.src === "") { 
        loadSong(current);
      }
      player.play();
      playing = true;
    }
  }

  function nextSong() {
    current = (current + 1) % songs.length;
    loadSong(current);
    if (playing) player.play();
  }

  function prevSong() {
    current = (current - 1 + songs.length) % songs.length;
    loadSong(current);
    if (playing) player.play();
  }
</script>
</body>
</html>
